  <path d="M727 288l18-30 18 30z" fill="#8aa0bd"/>

  <text x="600" y="48" text-anchor="middle" fill="#0b1220" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Parsec Bubble Input</text>
</svg>
