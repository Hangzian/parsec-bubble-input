name: Release APK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the APK to
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  build-apk:
    name: Build and attach debug APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build Android debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "parsec-bubble-input-${RELEASE_TAG}-debug.apk"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" "parsec-bubble-input-${RELEASE_TAG}-debug.apk" --clobber
